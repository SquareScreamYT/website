<body>
  <div id="theme-toggle">

  <script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
  <script>
    // name of this file so it gets whatever the file's name is
    let page = window.location.pathname.split("/").pop().replace(/\.[^/.]+$/, "");
    if (!page || page === "") page = "index";
    const markdownSource = page + ".md";
  </script>
