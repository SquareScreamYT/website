<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="output.css" rel="stylesheet">
  <title>sq - home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-950 font-['Nunito_Sans'] scroll-smooth">

  <header class="fixed top-0 left-0 w-full z-50 bg-white/30 backdrop-blur-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4">
      <div class="flex items-center space-x-2">
        <img src="images/pfp8.png" alt="sq" class="w-6 h-6 rounded-full object-cover" />
        <h1 class="text-xl font-bold text-cyan-400">sq</h1>
      </div>

      <nav class="space-x-6 hidden md:block">
        <a href="#about" class="hover:text-cyan-400">About</a>
        <a href="#projects" class="hover:text-cyan-400">Projects</a>
        <a href="#contact" class="hover:text-cyan-400">Contact</a>
      </nav>
    </div>
  </header>

  <section class="h-screen relative bg-linear-to-r from-cyan-100 to-blue-100">
    <div class="perspective-[1000px] absolute" style="transform: translateY(30vh) translateX(10vw);">
      <img 
        src="images/oslo.png"
        class="w-150 transform rotate-x-75 rotate-z-20 origin-bottom"
        style="
          -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-repeat: no-repeat;
          mask-size: cover;
          transform-origin: bottom;
          transition: transform 0.1s ease-out;
          transform-origin: bottom right;
        "
      />
    </div>

    <div class="perspective-[1000px] absolute" style="transform: translateY(10vh) translateX(10vw);">
      <img 
        src="images/sofia.png"
        class="w-150 transform rotate-x-75 rotate-z-20 origin-bottom"
        style="
          -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-repeat: no-repeat;
          mask-size: cover;
          transform-origin: bottom;
          transition: transform 0.1s ease-out;
          transform-origin: bottom right;
        "
      />
    </div>

    <div class="perspective-[1000px] absolute" style="transform: translateY(-10vh) translateX(10vw);">
      <img 
        src="images/tbilisi.png"
        class="w-150 transform rotate-x-75 rotate-z-20 origin-bottom"
        style="
          -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-repeat: no-repeat;
          mask-size: cover;
          transform-origin: bottom;
          transition: transform 0.1s ease-out;
          transform-origin: bottom right;
        "
      />
    </div>

    <div class="perspective-[1000px] absolute" style="transform: translateY(-30vh) translateX(10vw);">
      <img 
        src="images/bratislava.png"
        class="w-150 transform rotate-x-75 rotate-z-20 origin-bottom"
        style="
          -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
          mask-repeat: no-repeat;
          mask-size: cover;
          transform-origin: bottom;
          transition: transform 0.1s ease-out;
          transform-origin: bottom right;
        "
      />
    </div>

    <div class="absolute top-1/2 left-1/2 md:left-2/3 transform -translate-x-1/2 -translate-y-1/2
                bg-white/90 dark:bg-gray-900/90 shadow-2xl rounded-xl p-6 max-w-sm w-full
                backdrop-blur-md">
      <div class="flex justify-center -mt-16">
        <img src="images/pfp8.png" alt="Profile" class="w-24 h-24 rounded-full border-4 border-white shadow-lg">
      </div>
        <div class="mt-4 text-left">
          <div
            class="marquee-container"
            style="width:80%; font-family:'Nunito Sans'; margin:0 auto;"
          >
            <div class="marquee-content text-gray-300 text-2xl font-bold">
              <span class="text-gray-50 text-2xl font-bold">hi. </span>
              attál. helo. <span class="font-normal">今日は</span>.
              <span class="font-normal">你好</span>. servus. hej. kaixo. yaa. toki.
              привіт. terve. aluu. <span class="font-normal">안녕</span>.
            </div>
          </div>
        </div>

        <style>
          .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
          }

          .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 30s linear infinite;
          }

          @keyframes marquee {
            from {
              transform: translateX(0);
            }

            to {
              transform: translateX(-100%);
            }
          }
        </style>
        <p class="mt-2 text-gray-700 dark:text-gray-300 text-center">
          Hi. I'm sq. I make stuff sometimes.
        </p>
      </div>
    </div>
  </section>

  <section class="relative h-screen overflow-hidden">
    <div
      class="absolute inset-0 bg-cover bg-center opacity-30"
      style="background-image: url('images/cenrail6.png');"
    ></div>

    <div class="relative z-10 w-full h-full">
      <img
        src="images/tyne_and_wear.png"
        class="slide from-left absolute top-[8%] left-[10%] w-70 -rotate-12 rounded-xl shadow-2xl transition-all duration-300 ease-out hover:scale-120 hover:z-20 hover:rotate-0"
      />

      <img
        src="images/bucharest.png"
        class="slide from-left absolute bottom-[10%] left-[10%] w-70 rotate-4 rounded-xl shadow-2xl transition-all duration-300 ease-out hover:scale-120 hover:z-20 hover:rotate-0"
      />

      <img
        src="images/denver.png"
        class="hidden md:block slide from-right absolute top-[18%] right-[10%] w-78 rotate-8 rounded-xl shadow-2xl transition-all duration-300 ease-out hover:scale-120 hover:z-20 hover:rotate-0"
      />

      <img
        src="images/doha.png"
        class="hidden md:block slide from-top absolute bottom-[20%] left-[30%] w-64 rotate-9 rounded-xl shadow-2xl transition-all duration-300 ease-out hover:scale-120 hover:z-20 hover:rotate-0"
      />

      <img
        src="images/copenhagen.png"
        class="hidden md:block slide from-bottom absolute top-[45%] left-[50%] w-74 -rotate-6 rounded-xl shadow-2xl transition-all duration-300 ease-out hover:scale-120 hover:z-20 hover:rotate-0"
      />

      <img
        src="images/freiburg.png"
        class="hidden md:block slide from-right absolute bottom-[10%] right-[15%] w-72 rotate-11 rounded-xl shadow-2xl transition-all duration-300 ease-out hover:scale-120 hover:z-20 hover:rotate-0"
      />

      <div class="text-3xl absolute bottom-6 left-1/2 -translate-x-1/2 z-20">
        <h2><a href="/maps"
          class="bg-linear-to-r font-bold from-pink-500 via-purple-500 to-pink-500
            bg-size-[200%_200%] text-transparent bg-clip-text
            animate-gradient-x transition animate-bounce">
          See more maps
        </a></h2>
      </div>
    </div>
  </section>

  <footer class="text-center py-6 text-gray-500 text-sm">
    © 2025-2026 sq
  </footer>

  <script src="https://unpkg.com/scrollreveal"></script>
  <script>
    const sr = ScrollReveal({
      reset: false
    });

    sr.reveal(".slide", {
      distance: "200px",
      duration: 1200,
      easing: "ease-out",
      interval: 120
    });
    
  sr.reveal(".from-left",   { origin: "left" });
  sr.reveal(".from-right",  { origin: "right" });
  sr.reveal(".from-top",    { origin: "top" });
  sr.reveal(".from-bottom", { origin: "bottom" });
  </script>
  <script src="script.js"></script>
</body>
</html>
